<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>

            <msup>
              <mi>𝐿</mi>

            <msup>

            <msup>

            </msup>
            <msup>

            <msup>

            </msup>
            <msup>

              <mn>2</mn>
            </msup>
            <msup>
              <mi>𝑡</mi>
              <mi>𝑤</mi>
            </msup>
            <msup>
              <mi>𝛾</mi>
              <mi>𝑉</mi>
            </msup>
            <msup>
              <mi>𝑝</mi>
              <mo>+</mo>
            </msup>
          </mtd>
        </mtr>
        <mtr>
          <mtd>

            </msub>
            <msub>
              <mi>𝑥</mi>
              <mi>𝑗</mi>
            </msub>
            <msub>
              <mi>𝑥</mi>
              <mi>𝐴</mi>
            </msub>
            <msub>
              <mi>𝑦</mi>
              <mi>𝑙</mi>
            </msub>
            <msub>
              <mi>𝑦</mi>
              <mi>𝑦</mi>
            </msub>
            <msub>

            </msub>

        </mtr>
        <mtr>

            </msub>

          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mmultiscripts>
              <mi>𝑊</mi>
              <mrow></mrow>
              <mrow></mrow>
              <mprescripts/>

              <mi>𝑙</mi>

            <mmultiscripts>

              <mprescripts/>

            <mmultiscripts>

              <mrow></mrow>

              <mrow></mrow>
              <mprescripts/>
              <mi>𝜉</mi>
              <mrow></mrow>
            </mmultiscripts>
            <mmultiscripts>
              <mi>𝒜︀</mi>
              <mrow></mrow>
              <mrow></mrow>
              <mprescripts/>
              <mi>𝑚</mi>
              <mrow></mrow>
            </mmultiscripts>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
