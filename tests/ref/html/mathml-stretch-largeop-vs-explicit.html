<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      mtable.multiline-equation {
        math-style: unset;
      }
      
      mtable.multiline-equation mtd {
        padding: 0;
      }
      
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mo form="prefix">∫</mo>
    </math>
    <math display="block">
      <mo form="prefix" stretchy="true">∫</mo>
    </math>
    <math display="block">
      <mo form="prefix" minsize="50pt" stretchy="true">∫</mo>
    </math>
    <math display="block">
      <mo form="prefix" minsize="50%" stretchy="true">∫</mo>
    </math>
  </body>
</html>
