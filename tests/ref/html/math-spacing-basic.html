<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mi>ä</mi><mo>,</mo><mo form="prefix">+</mo><mo>,</mo><mi>𝑐</mi><mo>,</mo><mrow><mo>(</mo><mo>,</mo><mo>)</mo></mrow></math><br><math><mo form="infix" lspace="0em" rspace="0em">=</mo><mo form="postfix" stretchy="false">)</mo><mo>,</mo><mrow><mo>(</mo><mo form="prefix">+</mo><mo>)</mo></mrow><mo>,</mo><mrow><mo>{</mo><mo lspace="0em" rspace="0em">×</mo><mo>}</mo></mrow></math><br><math><mo form="postfix" stretchy="false">⟧</mo><mo>&lt;</mo><mo form="prefix" stretchy="false">⟦</mo><mo>,</mo><mrow><mo>|</mo><mo form="prefix">−</mo><mo>|</mo></mrow><mo>,</mo><mo form="prefix" stretchy="false">[</mo><mo form="infix" lspace="0em" rspace="0em">=</mo></math><br><math><mi>𝑎</mi><mo>=</mo><mi>𝑏</mi><mo>,</mo><mi>𝑎</mi><mo rspace="0em">=</mo><mo lspace="0em">=</mo><mi>𝑏</mi></math><br><math><mo>−</mo><mi>𝑎</mi><mo>,</mo><mo form="prefix">+</mo><mi>𝑎</mi></math><br><math><mi>𝑎</mi><mo form="prefix">¬</mo><mi>𝑏</mi></math><br><math><mi>𝑎</mi><mo>+</mo><mi>𝑏</mi><mo>,</mo><mi>𝑎</mi><mo lspace="0.2222222222222222em" rspace="0.2222222222222222em">∗</mo><mi>𝑏</mi></math><br><math><mo lspace="0em">∑</mo><mi>𝑥</mi><mo>,</mo><mo form="prefix" lspace="0em" rspace="0em">∑</mo><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow></math><br><math><mo lspace="0em">∑</mo><mo form="prefix" lspace="0em">∏</mo><mi>𝑥</mi></math><br><math><mi>𝑓</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo>,</mo><mi>𝜁</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo>,</mo><mtext>frac</mtext><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow></math><br><math><mi>𝑎</mi><mo>+</mo><mi>⋯</mi><mo>+</mo><mi>𝑏</mi></math> <math><mi>𝑓</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo form="prefix" lspace="0.16666666666666666em" rspace="0em">sin</mo><mrow><mo>(</mo><mi>𝑦</mi><mo>)</mo></mrow></math></p>
  </body>
</html>
