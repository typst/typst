<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      mroot {
        math-shift: inherit;
      }
      mroot > :first-child,
      munder > :nth-child(2),
      munderover > :nth-child(2),
      munder[accentunder="true" i] > :first-child {
        math-shift: compact
      }
      munder[accentunder="true" i] > :nth-child(2),
      mover[accent="true" i] > :nth-child(2) {
        math-depth: inherit;
        math-style: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mo lspace="0em" rspace="0em">det</mo>
      <mrow>
        <mo>(</mo>
        <mi>𝐴</mi>
        <mo>)</mo>
      </mrow>
      <mo>=</mo>
      <munder>
        <mo form="prefix" lspace="0em">∑</mo>
        <mrow>
          <mi>𝜎</mi>
          <mo lspace="0em" rspace="0em">∈</mo>
          <msub>
            <mi>𝑆</mi>
            <mi>𝑛</mi>
          </msub>
        </mrow>
      </munder>
      <mi>𝜖</mi>
      <mrow>
        <mo>(</mo>
        <mi>𝜎</mi>
        <mo>)</mo>
      </mrow>
      <munderover>
        <mo form="prefix">∏</mo>
        <mrow>
          <mi>𝑖</mi>
          <mo lspace="0em" rspace="0em">=</mo>
          <mn>1</mn>
        </mrow>
        <mi>𝑛</mi>
      </munderover>
      <msub>
        <mi>𝑎</mi>
        <mrow>
          <mi>𝑖</mi>
          <mo rspace="0em">,</mo>
          <msub>
            <mi>𝜎</mi>
            <mi>𝑖</mi>
          </msub>
        </mrow>
      </msub>
    </math>
  </body>
</html>
