<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mrow>
        <mtable>
          <mtr>
            <mtd>
              <msub>
                <mi>𝑎</mi>
                <msubsup>
                  <mn>1</mn>
                  <mn>2</mn>
                  <mn>3</mn>
                </msubsup>
              </msub>
            </mtd>
            <mtd>
              <msup>
                <mi>𝑏</mi>
                <msubsup>
                  <mn>1</mn>
                  <mn>3</mn>
                  <mn>2</mn>
                </msubsup>
              </msup>
            </mtd>
            <mtd>
              <msubsup>
                <mi>𝑐</mi>
                <mn>1</mn>
                <msup>
                  <mn>2</mn>
                  <mn>3</mn>
                </msup>
              </msubsup>
            </mtd>
            <mtd>
              <msubsup>
                <mi>𝑑</mi>
                <msub>
                  <mn>2</mn>
                  <mn>3</mn>
                </msub>
                <mn>1</mn>
              </msubsup>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <msubsup>
                <mi>𝑎</mi>
                <msubsup>
                  <mn>1</mn>
                  <mn>2</mn>
                  <mn>3</mn>
                </msubsup>
                <mo>′</mo>
              </msubsup>
            </mtd>
            <mtd>
              <msup>
                <mi>𝑏</mi>
                <mrow>
                  <mo form="postfix">′</mo>
                  <msubsup>
                    <mn>1</mn>
                    <mn>3</mn>
                    <mn>2</mn>
                  </msubsup>
                </mrow>
              </msup>
            </mtd>
            <mtd>
              <msubsup>
                <mi>𝑐</mi>
                <mn>1</mn>
                <mrow>
                  <mo form="postfix">′</mo>
                  <msup>
                    <mn>2</mn>
                    <mn>3</mn>
                  </msup>
                </mrow>
              </msubsup>
            </mtd>
            <mtd>
              <msubsup>
                <mi>𝑑</mi>
                <msub>
                  <mn>2</mn>
                  <mn>3</mn>
                </msub>
                <mrow>
                  <mo form="postfix">′</mo>
                  <mn>1</mn>
                </mrow>
              </msubsup>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <msub>
                <mi>𝑎</mi>
                <msubsup>
                  <mn>1</mn>
                  <mn>2</mn>
                  <mrow>
                    <mo form="postfix">′</mo>
                    <mn>3</mn>
                  </mrow>
                </msubsup>
              </msub>
            </mtd>
            <mtd>
              <msup>
                <mi>𝑏</mi>
                <msubsup>
                  <mn>1</mn>
                  <mn>3</mn>
                  <mrow>
                    <mo form="postfix">′</mo>
                    <mn>2</mn>
                  </mrow>
                </msubsup>
              </msup>
            </mtd>
            <mtd>
              <msubsup>
                <mi>𝑐</mi>
                <msup>
                  <mn>1</mn>
                  <mo>′</mo>
                </msup>
                <msup>
                  <mn>2</mn>
                  <mn>3</mn>
                </msup>
              </msubsup>
            </mtd>
            <mtd>
              <msubsup>
                <mi>𝑑</mi>
                <msub>
                  <mn>2</mn>
                  <mn>3</mn>
                </msub>
                <msup>
                  <mn>1</mn>
                  <mo>′</mo>
                </msup>
              </msubsup>
            </mtd>
          </mtr>
        </mtable>
      </mrow>
    </math>
  </body>
</html>
