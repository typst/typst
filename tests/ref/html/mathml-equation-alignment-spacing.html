<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <math display="block">
      <mtable style="math-style: normal">
        <mtr>
          <mtd style="padding: 0em; text-align: -webkit-right">
            <mi>𝑎</mi>
          </mtd>
          <mtd style="padding: 0em; text-align: -webkit-left">
            <mo form="infix">=</mo>
            <mi>𝑏</mi>
            <mo>+</mo>
            <mi>𝑐</mi>
          </mtd>
        </mtr>
        <mtr>
          <mtd style="padding: 0em; text-align: -webkit-right">
            <mi>𝑑</mi>
            <mo form="infix">+</mo>
          </mtd>
          <mtd style="padding: 0em; text-align: -webkit-left">
            <mo>−</mo>
            <mi>𝑓</mi>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
