<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mrow>
        <mo>{</mo>
        <munder>
          <munder accentunder="true">
            <mrow>
              <mover>
                <mover accent="true">
                  <mrow>
                    <mi style="math-shift: normal">𝑎</mi>
                    <mo style="math-shift: normal">,</mo>
                    <mi style="math-shift: normal">…</mi>
                    <mo style="math-shift: normal">,</mo>
                    <mi style="math-shift: normal">𝑎</mi>
                  </mrow>
                  <mo>⏞</mo>
                </mover>
                <mrow>
                  <mi>𝑘</mi>
                  <msup>
                    <mi>𝑎</mi>
                    <mo>′</mo>
                  </msup>
                  <mi>𝑠</mi>
                </mrow>
              </mover>
              <mo>,</mo>
              <mover>
                <mover accent="true">
                  <mrow>
                    <mi style="math-shift: normal">𝑏</mi>
                    <mo style="math-shift: normal">,</mo>
                    <mi style="math-shift: normal">…</mi>
                    <mo style="math-shift: normal">,</mo>
                    <mi style="math-shift: normal">𝑏</mi>
                  </mrow>
                  <mo>⏞</mo>
                </mover>
                <mrow>
                  <mi>ℓ</mi>
                  <msup>
                    <mi>𝑏</mi>
                    <mo>′</mo>
                  </msup>
                  <mi>𝑠</mi>
                </mrow>
              </mover>
            </mrow>
            <mo>⏟</mo>
          </munder>
          <mrow>
            <mi>𝑘</mi>
            <mo lspace="0em" rspace="0em">+</mo>
            <mi>ℓ</mi>
            <mspace width="0.2222222222222222em"/>
            <mtext>elements</mtext>
          </mrow>
        </munder>
        <mo>}</mo>
      </mrow>
    </math>
  </body>
</html>
