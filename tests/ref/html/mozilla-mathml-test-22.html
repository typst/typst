<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      mroot {
        math-shift: inherit;
      }
      mroot > :first-child,
      munder > :nth-child(2),
      munderover > :nth-child(2),
      munder[accentunder="true" i] > :first-child {
        math-shift: compact
      }
      munder[accentunder="true" i] > :nth-child(2),
      mover[accent="true" i] > :nth-child(2) {
        math-depth: inherit;
        math-style: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mrow>
        <mo>{</mo>
        <munder>
          <munder accentunder="true">
            <mrow>
              <mover>
                <mover accent="true">
                  <mrow>
                    <mi>𝑎</mi>
                    <mo>,</mo>
                    <mi>…</mi>
                    <mo>,</mo>
                    <mi>𝑎</mi>
                  </mrow>
                  <mo>⏞</mo>
                </mover>
                <mrow>
                  <mi>𝑘</mi>
                  <msup>
                    <mi>𝑎</mi>
                    <mi>′</mi>
                  </msup>
                  <mi>𝑠</mi>
                </mrow>
              </mover>
              <mo>,</mo>
              <mover>
                <mover accent="true">
                  <mrow>
                    <mi>𝑏</mi>
                    <mo>,</mo>
                    <mi>…</mi>
                    <mo>,</mo>
                    <mi>𝑏</mi>
                  </mrow>
                  <mo>⏞</mo>
                </mover>
                <mrow>
                  <mi>ℓ</mi>
                  <msup>
                    <mi>𝑏</mi>
                    <mi>′</mi>
                  </msup>
                  <mi>𝑠</mi>
                </mrow>
              </mover>
            </mrow>
            <mo>⏟</mo>
          </munder>
          <mrow>
            <mi>𝑘</mi>
            <mo lspace="0em" rspace="0em">+</mo>
            <mi>ℓ</mi>
            <mspace width="0.2222222222222222em"/>
            <mtext>elements</mtext>
          </mrow>
        </munder>
        <mo>}</mo>
      </mrow>
    </math>
  </body>
</html>
