<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <mn>1</mn>
            <mo>+</mo>
            <mrow>
              <mo>(</mo>
              <mrow>
                <mfrac>
                  <mi>𝑎</mi>
                  <mi>𝑏</mi>
                </mfrac>
                <mo>+</mo>
                <mi>𝑏</mi>
              </mrow>
            </mrow>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mrow>
              <mrow>
                <mo form="infix" lspace="0em">=</mo>
                <mi>𝑐</mi>
              </mrow>
              <mo>)</mo>
            </mrow>
            <mo>+</mo>
            <mn>2</mn>
          </mtd>
        </mtr>
      </mtable>
    </math>
    <math display="block">
      <mtable class="multiline-equation aligned">
        <mtr>
          <mtd>
            <mrow>
              <mo minsize="200%">|</mo>
              <mrow>
                <mi>𝑥</mi>
                <mo>+</mo>
                <mi>𝑦</mi>
              </mrow>
            </mrow>
          </mtd>
          <mtd>
            <mrow>
              <mn>1</mn>
            </mrow>
          </mtd>
          <mtd>
            <mrow>
              <mn>2</mn>
            </mrow>
          </mtd>
          <mtd>
            <mrow>
              <mrow>
                <mi>𝑎</mi>
                <mo>+</mo>
                <mi>𝑏</mi>
              </mrow>
            </mrow>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mrow>
              <mn>3</mn>
            </mrow>
          </mtd>
          <mtd>
            <mrow>
              <mrow></mrow>
            </mrow>
          </mtd>
          <mtd>
            <mrow>
              <mrow></mrow>
            </mrow>
          </mtd>
          <mtd>
            <mrow>
              <mn>4</mn>
              <mo minsize="200%">|</mo>
            </mrow>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
