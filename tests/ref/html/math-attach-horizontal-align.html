<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <msub>
              <mi>𝑥</mi>
              <mn>1</mn>
            </msub>
            <msub>
              <mi>𝑝</mi>
              <mn>1</mn>
            </msub>
            <msub>
              <mi>𝔭</mi>
              <mn>1</mn>
            </msub>
            <msub>
              <mn>2</mn>
              <mn>1</mn>
            </msub>
            <msub>
              <mo lspace="0.2222222222222222em" rspace="0.2222222222222222em">⋅</mo>
              <mn>1</mn>
            </msub>
            <msub>
              <mo form="prefix" lspace="0em" rspace="0.16666666666666666em">lg</mo>
              <mn>1</mn>
            </msub>
            <msub>
              <mo form="postfix">!</mo>
              <mn>1</mn>
            </msub>
            <msub>
              <mo lspace="0.2222222222222222em">\</mo>
              <mn>1</mn>
            </msub>
            <msub>
              <mo form="postfix" stretchy="false">]</mo>
              <mn>1</mn>
            </msub>
            <msub>
              <mtext>ip</mtext>
              <mn>1</mn>
            </msub>
            <msub>
              <mo form="prefix" lspace="0.16666666666666666em" rspace="0em">iq</mo>
              <mn>1</mn>
            </msub>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <msup>
              <mi>𝑥</mi>
              <mn>1</mn>
            </msup>
            <msup>
              <mi>𝑏</mi>
              <mn>1</mn>
            </msup>
            <msup>
              <mi>𝔟</mi>
              <mn>1</mn>
            </msup>
            <msup>
              <mn>2</mn>
              <mn>1</mn>
            </msup>
            <msup>
              <mo lspace="0.2222222222222222em" rspace="0.2222222222222222em">⋅</mo>
              <mn>1</mn>
            </msup>
            <msup>
              <mo form="prefix" lspace="0em" rspace="0.16666666666666666em">lg</mo>
              <mn>1</mn>
            </msup>
            <msup>
              <mo form="postfix">!</mo>
              <mn>1</mn>
            </msup>
            <msup>
              <mo lspace="0.2222222222222222em">\</mo>
              <mn>1</mn>
            </msup>
            <msup>
              <mo form="postfix" stretchy="false">]</mo>
              <mn>1</mn>
            </msup>
            <msup>
              <mtext>ib</mtext>
              <mn>1</mn>
            </msup>
            <msup>
              <mo form="prefix" lspace="0.16666666666666666em" rspace="0em">id</mo>
              <mn>1</mn>
            </msup>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <msub>
              <mtext>_</mtext>
              <mn>1</mn>
            </msub>
            <msup>
              <mtext>`</mtext>
              <mn>1</mn>
            </msup>
            <msub>
              <mi>𝑥</mi>
              <mn>1</mn>
            </msub>
            <msub>
              <mi>𝑦</mi>
              <mn>1</mn>
            </msub>
            <msup>
              <mi>𝑥</mi>
              <mn>1</mn>
            </msup>
            <msup>
              <mi>𝑙</mi>
              <mn>1</mn>
            </msup>
            <mmultiscripts>
              <mi>𝐼</mi>
              <mn>1</mn>
              <mn>1</mn>
              <mprescripts/>
              <mn>1</mn>
              <mn>1</mn>
            </mmultiscripts>
            <msubsup>
              <mo form="prefix">∑</mo>
              <mn>1</mn>
              <mn>1</mn>
            </msubsup>
            <msubsup>
              <mo form="prefix" lspace="0em">∫</mo>
              <mn>1</mn>
              <mn>1</mn>
            </msubsup>
            <msubsup>
              <mrow>
                <mo>|</mo>
                <mfrac>
                  <mn>1</mn>
                  <mn>2</mn>
                </mfrac>
                <mo>|</mo>
              </mrow>
              <mn>1</mn>
              <mn>1</mn>
            </msubsup>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <msubsup>
              <mi>𝑥</mi>
              <mn>1</mn>
              <mn>1</mn>
            </msubsup>
            <mo>,</mo>
            <msubsup>
              <mtext>)</mtext>
              <mn>1</mn>
              <mn>1</mn>
            </msubsup>
            <msubsup>
              <mrow>
                <mo>(</mo>
                <mrow>
                  <mi>𝑏</mi>
                  <mi>𝑦</mi>
                </mrow>
                <mo>)</mo>
              </mrow>
              <mn>1</mn>
              <mn>1</mn>
            </msubsup>
            <mo>,</mo>
            <msub>
              <mtext>[∫]</mtext>
              <mn>1</mn>
            </msub>
            <msub>
              <mrow>
                <mo>[</mo>
                <mo form="prefix" lspace="0em" rspace="0em">∫</mo>
                <mo>]</mo>
              </mrow>
              <mn>1</mn>
            </msub>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
