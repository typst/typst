<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <div style="display: grid; grid-template-columns: repeat(2, min-content);  gap: 5pt">
      <div style="width: 70pt; height: 70pt; background: conic-gradient(from 45deg at 70% 30% in oklab, #000004 0%, #170b3a 10%, #420a68 20%, #6b176e 30%, #932667 40%, #bb3654 50%, #dd513a 60%, #f3771a 70%, #fca50a 80%, #f6d644 90%, #fcffa4 100%)"></div>
      <div style="width: 25pt; height: 70pt; background: conic-gradient(from 45deg at 70% 30% in oklab, #000004 0%, #170b3a 10%, #420a68 20%, #6b176e 30%, #932667 40%, #bb3654 50%, #dd513a 60%, #f3771a 70%, #fca50a 80%, #f6d644 90%, #fcffa4 100%)"></div>
      <div style="width: 70pt; height: 25pt; background: conic-gradient(from 45deg at 70% 30% in oklab, #000004 0%, #170b3a 10%, #420a68 20%, #6b176e 30%, #932667 40%, #bb3654 50%, #dd513a 60%, #f3771a 70%, #fca50a 80%, #f6d644 90%, #fcffa4 100%)"></div>
    </div>
  </body>
</html>
