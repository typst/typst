<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <mover>
              <mo lspace="0em">∏</mo>
              <mn>123456789</mn>
            </mover>
            <mover>
              <mmultiscripts>
                <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                <mrow></mrow>
                <mrow></mrow>
                <mprescripts/>
                <mi>𝑥</mi>
                <mrow></mrow>
              </mmultiscripts>
              <mn>123456789</mn>
            </mover>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <munder>
              <mo lspace="0em">∏</mo>
              <mn>123456789</mn>
            </munder>
            <munder>
              <msup>
                <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                <mi>𝑥</mi>
              </msup>
              <mn>123456789</mn>
            </munder>
          </mtd>
        </mtr>
      </mtable>
    </math>
    <p><math><mover><mo lspace="0em" movablelimits="false">∏</mo><mn>123456789</mn></mover><mover><mmultiscripts><mo form="prefix" lspace="0em" rspace="0em" movablelimits="false">∏</mo><mrow></mrow><mrow></mrow><mprescripts/><mi>𝑥</mi><mrow></mrow></mmultiscripts><mn>123456789</mn></mover></math></p>
    <p><math><munder><mo lspace="0em" movablelimits="false">∏</mo><mn>123456789</mn></munder><munder><msup><mo form="prefix" lspace="0em" rspace="0em" movablelimits="false">∏</mo><mi>𝑥</mi></msup><mn>123456789</mn></munder></math></p>
  </body>
</html>
