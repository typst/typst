<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      mroot {
        math-shift: inherit;
      }
      mroot > :first-child,
      munder > :nth-child(2),
      munderover > :nth-child(2),
      munder[accentunder="true" i] > :first-child {
        math-shift: compact
      }
      munder[accentunder="true" i] > :nth-child(2),
      mover[accent="true" i] > :nth-child(2) {
        math-depth: inherit;
        math-style: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <munderover>
        <mo lspace="0em">∑</mo>
        <mrow>
          <mi>𝑖</mi>
          <mo lspace="0em" rspace="0em">=</mo>
          <mn>1</mn>
        </mrow>
        <mi>𝑝</mi>
      </munderover>
      <munderover>
        <mo form="prefix" lspace="0em">∑</mo>
        <mrow>
          <mi>𝑗</mi>
          <mo lspace="0em" rspace="0em">=</mo>
          <mn>1</mn>
        </mrow>
        <mi>𝑞</mi>
      </munderover>
      <munderover>
        <mo form="prefix" lspace="0em">∑</mo>
        <mrow>
          <mi>𝑘</mi>
          <mo lspace="0em" rspace="0em">=</mo>
          <mn>1</mn>
        </mrow>
        <mi>𝑟</mi>
      </munderover>
      <msub>
        <mi>𝑎</mi>
        <mrow>
          <mi>𝑖</mi>
          <mi>𝑗</mi>
        </mrow>
      </msub>
      <msub>
        <mi>𝑏</mi>
        <mrow>
          <mi>𝑗</mi>
          <mi>𝑘</mi>
        </mrow>
      </msub>
      <msub>
        <mi>𝑐</mi>
        <mrow>
          <mi>𝑘</mi>
          <mi>𝑖</mi>
        </mrow>
      </msub>
    </math>
  </body>
</html>
