<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      mtable.multiline-equation {
        math-style: unset;
      }
      
      mtable.multiline-equation mtd {
        padding: 0;
      }
      
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mo lspace="0em" rspace="0.16666666666666666em">tan</mo>
      <mi>𝑥</mi>
      <mo>=</mo>
      <mfrac>
        <mrow>
          <mo lspace="0em" rspace="0.16666666666666666em">sin</mo>
          <mi>𝑥</mi>
        </mrow>
        <mrow>
          <mo lspace="0em" rspace="0.16666666666666666em">cos</mo>
          <mi>𝑥</mi>
        </mrow>
      </mfrac>
    </math>
    <math display="block">
      <munder>
        <mo lspace="0em" rspace="0.16666666666666666em">custom</mo>
        <mrow>
          <mi>𝑛</mi>
          <mo lspace="0em" rspace="0em" stretchy="false">→</mo>
          <mi>∞</mi>
        </mrow>
      </munder>
      <mi>𝑛</mi>
    </math>
  </body>
</html>
