<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Alignment */
      mtable.right-align mtd,
      mtable mtd.right-align,
      mtable.left-align mtd.right-align,
      mtable.aligned mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      mtable.cases mtd,
      mtable.left-align mtd,
      mtable mtd.left-align,
      mtable.aligned mtd:nth-child(even),
      math:is(:not([display])) > mtable.multiline-equation mtd {
        text-align: -webkit-left;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.left-flush {
        padding-left: 0;
      }
      mtable.cases mtd,
      mtable.aligned mtd,
      mtable mtd.flushed,
      mtable mtd.right-flush {
        padding-right: 0;
      }
      
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      math > mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0.5em;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Accents */
      mover[accent="true" i] > :first-child {
        font-feature-settings: "dtls";
      }
      mover.dotted[accent="true" i] > :first-child {
        font-feature-settings: "dtls" 0;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <munder>
        <munder accentunder="true">
          <mrow>
            <mo>[</mo>
            <mrow>
              <mn>1</mn>
              <mo>,</mo>
              <mfrac>
                <mn>2</mn>
                <mn>3</mn>
              </mfrac>
            </mrow>
            <mo>]</mo>
          </mrow>
          <mo>⎵</mo>
        </munder>
        <mtext>relevant stuff</mtext>
      </munder>
      <mo stretchy="false">⟺</mo>
      <mover>
        <mover accent="true">
          <mrow style="math-shift: normal">
            <mo>[</mo>
            <mrow>
              <mfrac>
                <mn>4</mn>
                <mn>5</mn>
              </mfrac>
              <mo>,</mo>
              <mn>6</mn>
            </mrow>
            <mo>]</mo>
          </mrow>
          <mo>⎴</mo>
        </mover>
        <mtext>irrelevant stuff</mtext>
      </mover>
    </math>
  </body>
</html>
